name: Mimic automated tests

on:
  push:
    branches:
      - '*'

permissions:
  contents: read
  checks: write

jobs:
  create_automated_test_check:
    runs-on: ubuntu-latest
    steps:
      - name: Set Automated tests commit status to pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Automated tests',
              head_sha: context.sha,
              status: 'in_progress',
              started_at: new Date().toISOString(),
              output: {
                title: 'Automated tests are running',
                summary: 'The automated tests are currently in progress and awaiting results.'
              }
            });

  update_automated_test_check_status:
    runs-on: ubuntu-latest
    needs: create_automated_test_check
    steps:
      - name: Set Automated tests check runstatus to randomly picked
        uses: actions/github-script@v7
        with:
            script: |
              const statuses = ['in_progress', 'queued', 'completed'];
              const conclusions = ['success', 'failure', 'neutral', 'cancelled', 'timed_out', 'action_required', 'skipped'];
              const randomStatus = statuses[Math.floor(Math.random() * statuses.length)];
              let summary = `This is an example summary for the automated test check run.\nStatus: ${randomStatus}`;
              let checkRunParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Automated tests',
              head_sha: context.sha,
              status: randomStatus,
              output: {
                title: 'Automated Test Results',
                summary: summary,
                text: 'Detailed information about the test run can be placed here.',
                annotations: [
                {
                  path: 'README.md',
                  start_line: 1,
                  end_line: 1,
                  annotation_level: 'notice',
                  message: 'Example annotation message'
                }
                ],
                images: [
                {
                  alt: 'Example image',
                  image_url: 'https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png',
                  caption: 'Example image caption'
                }
                ]
              }
              };

              if (randomStatus === 'completed') {
              const randomConclusion = conclusions[Math.floor(Math.random() * conclusions.length)];
              checkRunParams.conclusion = randomConclusion;
              checkRunParams.completed_at = new Date().toISOString();
              checkRunParams.output.summary += `\nConclusion: ${randomConclusion}`;
              }

              await github.rest.checks.create(checkRunParams);
      - name: Output result
        run: echo "Automated tests status updated to ${{ needs.update_automated_test_check_status.outputs.status }}"