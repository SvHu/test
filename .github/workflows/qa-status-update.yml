name: QA status update

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA to update'
        required: true
      state:
        description: 'New QA status'
        required: true
        type: choice
        options:
          - success
          - failure
          - error
          - pending

  repository_dispatch:
    types: [qa_status_update]

permissions:
  contents: read
  statuses: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Set from workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const ref = core.getInput('ref', { required: true })
            const state = core.getInput('state', { required: true })
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: ref,
              state,
              context: 'QA testing',
              description: `QA status set via manual trigger (${state})`
            })

      - name: Set from repository_dispatch
        if: github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            // Expect payload:
            // {
            //   "event_type": "qa_status_update",
            //   "client_payload": { "ref": "<sha>", "state": "success|failure|error|pending", "description": "optional" }
            // }
            const payload = context.payload.client_payload || {}
            const ref = payload.ref
            const state = payload.state
            const description = payload.description || `QA status set via repository_dispatch (${state})`

            if (!ref) throw new Error('Missing client_payload.ref')
            if (!['success','failure','error','pending'].includes(state)) {
              throw new Error(`Invalid client_payload.state: ${state}`)
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: ref,
              state,
              context: 'QA testing',
              description
            })