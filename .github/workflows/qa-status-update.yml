name: QA status update

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit SHA to update'
        required: true
      state:
        description: 'New QA status'
        required: true
        type: choice
        options:
          - success
          - failure
          - neutral
          - cancelled
          - timed_out
          - action_required
          - in_progress
          - queued

  repository_dispatch:
    types: [qa_status_update]

permissions:
  contents: read
  checks: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Set from workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const ref = core.getInput('ref', { required: true })
            const state = core.getInput('state', { required: true })
            const validStates = [
              'success', 'failure', 'neutral', 'cancelled', 'timed_out', 'action_required', 'in_progress', 'queued'
            ]
            if (!validStates.includes(state)) {
              throw new Error(`Invalid state: ${state}`)
            }
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'QA testing',
              head_sha: ref,
              status: ['in_progress', 'queued'].includes(state) ? 'in_progress' : 'completed',
              conclusion: ['success', 'failure', 'neutral', 'cancelled', 'timed_out', 'action_required'].includes(state) ? state : undefined,
              output: {
                title: 'QA Status',
                summary: `QA status set via manual trigger (${state})`
              }
            })

      - name: Set from repository_dispatch
        if: github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            // Expect payload:
            // {
            //   "event_type": "qa_status_update",
            //   "client_payload": {
            //     "ref": "<sha>",
            //     "state": "...",
            //     "description": "optional",
            //     "details_url": "optional",
            //     "title": "optional",
            //     "summary": "optional",
            //     "text": "optional",
            //     "external_id": "optional"
            //   }
            // }
            const payload = context.payload.client_payload || {}
            const ref = payload.ref
            const state = payload.state
            const description = payload.description || `QA status set via repository_dispatch (${state})`
            const details_url = payload.details_url
            const title = payload.title || 'QA Status'
            const summary = payload.summary || description
            const text = payload.text
            const external_id = payload.external_id

            const validStates = [
              'success', 'failure', 'neutral', 'cancelled', 'timed_out', 'action_required', 'in_progress', 'queued'
            ]
            if (!ref) throw new Error('Missing client_payload.ref')
            if (!validStates.includes(state)) {
              throw new Error(`Invalid client_payload.state: ${state}`)
            }

            const checkParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'QA testing',
              head_sha: ref,
              status: ['in_progress', 'queued'].includes(state) ? 'in_progress' : 'completed',
              conclusion: ['success', 'failure', 'neutral', 'cancelled', 'timed_out', 'action_required'].includes(state) ? state : undefined,
              output: {
                title,
                summary,
              }
            }
            if (text) checkParams.output.text = text
            if (details_url) checkParams.details_url = details_url
            if (external_id) checkParams.external_id = external_id

            await github.rest.checks.create(checkParams)