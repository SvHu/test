name: QA status on branch push

on:
  push:
    branches:
      - 'staging'

permissions:
  contents: read
  statuses: write

jobs:
  set-pending:
    runs-on: ubuntu-latest
    steps:
      - name: Set QA status to pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'QA testing',
              description: 'Awaiting manual QA result'
            })