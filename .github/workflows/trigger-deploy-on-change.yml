name: Trigger Deploy on Change
permissions:
  actions: write

on:
  push:
    branches:
      - staging

jobs:
  trigger_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Deploy on Dispatch workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-on-dispatch.yml',
              ref: ${{ github.ref }},
              inputs: {
                source_ref: '${{ github.sha }}',
                target_ref: 'main',
                environment: 'demo'
              }
            });
